# Agent Chain Configurations
# These chains use agents from .pi/agents/agents/ subdirectory
# Each chain defines a sequence of agents with their prompts
# Chains can be selected and run using run_chain tool

# Full implementation pipeline
plan-build-review:
  description: "Plan, implement, and review — the standard development cycle"
  steps:
    - agent: expert-agent
      prompt: "Plan the implementation for: $INPUT"
    - agent: dev-agent
      prompt: "Implement the following plan:\n\n$INPUT"
    - agent: reviewer
      prompt: "Review this implementation for bugs, style, and correctness:\n\n$INPUT"

# Fast two-step implementation
plan-build:
  description: "Plan then build — fast two-step implementation without review"
  steps:
    - agent: expert-agent
      prompt: "Plan the implementation for: $INPUT"
    - agent: dev-agent
      prompt: "Based on this plan, implement:\n\n$INPUT"

# Deep research and validation
scout-flow:
  description: "Triple-scout deep recon — explore, validate, verify"
  steps:
    - agent: research-agent
      prompt: "Explore the codebase and investigate: $INPUT\n\nReport your findings with structure, key files, and patterns."
    - agent: research-agent
      prompt: "Validate and cross-check the following analysis. Look for anything missed, incorrect, or incomplete:\n\n$INPUT\n\nOriginal request: $ORIGINAL"
    - agent: expert-agent
      prompt: "Final review pass. Verify the analysis below is accurate and complete. Add any missing details or corrections:\n\n$INPUT\n\nOriginal request: $ORIGINAL"

# Iterative planning
plan-review-plan:
  description: "Iterative planning — plan, critique, then refine with feedback"
  steps:
    - agent: expert-agent
      prompt: "Create a detailed implementation plan for: $INPUT"
    - agent: expert-agent
      prompt: "Critically review this implementation plan. Challenge assumptions, find gaps, and suggest improvements:\n\n$INPUT\n\nOriginal request: $ORIGINAL"
    - agent: expert-agent
      prompt: "Revise and improve your implementation plan based on this critique. Address every issue raised and incorporate the recommendations:\n\nOriginal request: $ORIGINAL\n\nCritique:\n$INPUT"

# End-to-end full pipeline
full-review:
  description: "End-to-end pipeline — research, plan, build, and review"
  steps:
    - agent: research-agent
      prompt: "Research and analyze: $INPUT"
    - agent: expert-agent
      prompt: "Based on this research, create a plan:\n\n$INPUT"
    - agent: dev-agent
      prompt: "Implement this plan:\n\n$INPUT"
    - agent: reviewer
      prompt: "Review this implementation:\n\n$INPUT"

# Accessibility focused chain
accessibility-flow:
  description: "Accessibility-first implementation chain"
  steps:
    - agent: design-agent
      prompt: "Design an accessible solution for: $INPUT"
    - agent: accessibility-agent
      prompt: "Ensure WCAG compliance for this design:\n\n$INPUT"
    - agent: dev-agent
      prompt: "Implement with accessibility in mind:\n\n$INPUT"
    - agent: accessibility-agent
      prompt: "Verify accessibility compliance:\n\n$INPUT"

# Content creation chain
content-flow:
  description: "Content creation and optimization chain"
  steps:
    - agent: research-agent
      prompt: "Research content topics for: $INPUT"
    - agent: content-agent
      prompt: "Create compelling content:\n\n$INPUT"
    - agent: seo-agent
      prompt: "Optimize for SEO:\n\n$INPUT"
    - agent: content-agent
      prompt: "Final review and polish:\n\n$INPUT"

# Visual design chain
design-flow:
  description: "Visual design and UI/UX chain"
  steps:
    - agent: design-agent
      prompt: "Design visual elements for: $INPUT"
    - agent: image-agent
      prompt: "Select and optimize images:\n\n$INPUT"
    - agent: design-agent
      prompt: "Final design review:\n\n$INPUT"

# Marketing and strategy chain
marketing-flow:
  description: "Marketing strategy and positioning chain"
  steps:
    - agent: research-agent
      prompt: "Research market and competitors: $INPUT"
    - agent: marketing-agent
      prompt: "Develop marketing strategy:\n\n$INPUT"
    - agent: content-agent
      prompt: "Create marketing content:\n\n$INPUT"

# Multi-disciplinary team chain
full-team-chain:
  description: "Full team collaboration chain"
  steps:
    - agent: research-agent
      prompt: "Initial research and analysis: $INPUT"
    - agent: expert-agent
      prompt: "Create implementation plan:\n\n$INPUT"
    - agent: design-agent
      prompt: "Design visual elements:\n\n$INPUT"
    - agent: dev-agent
      prompt: "Develop implementation:\n\n$INPUT"
    - agent: accessibility-agent
      prompt: "Verify accessibility:\n\n$INPUT"
    - agent: content-agent
      prompt: "Create content and copy:\n\n$INPUT"
    - agent: marketing-agent
      prompt: "Final marketing review:\n\n$INPUT"
    - agent: reviewer
      prompt: "Final quality review:\n\n$INPUT"
