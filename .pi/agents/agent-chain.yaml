# Agent Chain Configurations
# These chains use agents from agents.yaml

# Full development pipeline
plan-build-review:
  description: "Plan, implement, and review — the standard development cycle"
  steps:
    - agent: planner
      prompt: "Plan the implementation for: $INPUT"
    - agent: developer
      prompt: "Implement the following plan:\n\n$INPUT"
    - agent: reviewer
      prompt: "Review this implementation for bugs, style, and correctness:\n\n$INPUT"

# Fast two-step implementation
plan-build:
  description: "Plan then build — fast two-step implementation without review"
  steps:
    - agent: planner
      prompt: "Plan the implementation for: $INPUT"
    - agent: developer
      prompt: "Based on this plan, implement:\n\n$INPUT"

# Deep research and validation
scout-flow:
  description: "Triple-scout deep recon — explore, validate, verify"
  steps:
    - agent: scout
      prompt: "Explore the codebase and investigate: $INPUT\n\nReport your findings with structure, key files, and patterns."
    - agent: scout
      prompt: "Validate and cross-check the following analysis. Look for anything missed, incorrect, or incomplete:\n\n$INPUT\n\nOriginal request: $ORIGINAL"
    - agent: scout
      prompt: "Final review pass. Verify the analysis below is accurate and complete. Add any missing details or corrections:\n\n$INPUT\n\nOriginal request: $ORIGINAL"

# Iterative planning
plan-review-plan:
  description: "Iterative planning — plan, critique, then refine with feedback"
  steps:
    - agent: planner
      prompt: "Create a detailed implementation plan for: $INPUT"
    - agent: plan-reviewer
      prompt: "Critically review this implementation plan. Challenge assumptions, find gaps, and suggest improvements:\n\n$INPUT\n\nOriginal request: $ORIGINAL"
    - agent: planner
      prompt: "Revise and improve your implementation plan based on this critique. Address every issue raised and incorporate the recommendations:\n\nOriginal request: $ORIGINAL\n\nCritique:\n$INPUT"

# End-to-end full pipeline
full-review:
  description: "End-to-end pipeline — scout, plan, build, and review"
  steps:
    - agent: scout
      prompt: "Explore the codebase and identify: $INPUT"
    - agent: planner
      prompt: "Based on this analysis, create a plan:\n\n$INPUT"
    - agent: developer
      prompt: "Implement this plan:\n\n$INPUT"
    - agent: reviewer
      prompt: "Review this implementation:\n\n$INPUT"

# Browser automation workflow
browser-flow:
  description: "Browser automation and testing workflow"
  steps:
    - agent: scout
      prompt: "Analyze the target environment and identify automation opportunities: $INPUT"
    - agent: developer
      prompt: "Write automation scripts for the identified tasks:\n\n$INPUT"
    - agent: bowser
      prompt: "Execute the browser automation and capture results:\n\n$INPUT"
    - agent: documenter
      prompt: "Document the browser automation session and results:\n\n$INPUT"

# Session management workflow
session-workflow:
  description: "Session management and retrieval workflow"
  steps:
    - agent: session-manager
      prompt: "List available sessions and context: $INPUT"
    - agent: developer
      prompt: "Develop the solution based on session context:\n\n$INPUT"
    - agent: documenter
      prompt: "Document the session workflow and results:\n\n$INPUT"

# Security research workflow
security-research-flow:
  description: "Security research and analysis workflow"
  steps:
    - agent: scout
      prompt: "Scan the codebase for potential security issues: $INPUT"
    - agent: red-team
      prompt: "Perform adversarial testing and identify vulnerabilities:\n\n$INPUT"
    - agent: developer
      prompt: "Implement security fixes and improvements:\n\n$INPUT"
    - agent: reviewer
      prompt: "Review the security implementation:\n\n$INPUT"

# Netlify deployment workflow
deploy-workflow:
  description: "CI/CD deployment and troubleshooting workflow"
  steps:
    - agent: scout
      prompt: "Analyze the build environment and dependencies: $INPUT"
    - agent: netlify-troubleshooter
      prompt: "Diagnose build issues and dependency problems:\n\n$INPUT"
    - agent: developer
      prompt: "Fix the identified issues and optimize deployment:\n\n$INPUT"
    - agent: documenter
      prompt: "Document the deployment process and lessons learned:\n\n$INPUT"

# Extensions development workflow
extensions-workflow:
  description: "Pi extensions development workflow"
  steps:
    - agent: pi-dev-expert
      prompt: "Plan the extension architecture: $INPUT"
    - agent: ext-builder
      prompt: "Build the extension with proper API integration:\n\n$INPUT"
    - agent: developer
      prompt: "Implement the extension code:\n\n$INPUT"
    - agent: documenter
      prompt: "Document the extension:\n\n$INPUT"
    - agent: reviewer
      prompt: "Review the extension for quality and compliance:\n\n$INPUT"

# Documentation workflow
docs-workflow:
  description: "Documentation and knowledge base workflow"
  steps:
    - agent: scout
      prompt: "Identify documentation needs: $INPUT"
    - agent: documenter
      prompt: "Create the documentation:\n\n$INPUT"
    - agent: developer
      prompt: "Review and validate the documentation:\n\n$INPUT"

# Architecture review workflow
architecture-review:
  description: "Architecture review and design workflow"
  steps:
    - agent: planner
      prompt: "Create architecture plan: $INPUT"
    - agent: plan-reviewer
      prompt: "Review and critique the architecture:\n\n$INPUT"
    - agent: pi-dev-expert
      prompt: "Provide architectural guidance:\n\n$INPUT"
    - agent: reviewer
      prompt: "Final architecture review:\n\n$INPUT"
