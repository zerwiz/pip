# Master Agent Registry
# Synchronized with .md files in:
# - .pi/agents/agents/ (Core)
# - .pi/agents/specialagents/ (Special)
# - .pi/agents/pi-pi/ (Meta)

# --- Core Agents (.pi/agents/agents/) ---

scout:
  name: scout
  description: Fast recon and codebase exploration agent. Specialized in discovering file paths, configurations, and documentation storage locations.
  tools: read,grep,find,ls

planner:
  name: planner
  description: Architecture and implementation planning
  tools: read,grep,find,ls,write

developer:
  name: developer
  description: Implementation and code generation
  tools: read,write,edit,bash,grep,find,ls

reviewer:
  name: reviewer
  description: Code review and quality checks
  tools: read,bash,grep,find,ls,write

documenter:
  name: documenter
  description: Documentation and README generation
  tools: read,write,edit,grep,find,ls

red-team:
  name: red-team
  description: Security and adversarial testing
  tools: read,bash,grep,find,ls

frontend-coder:
  name: frontend-coder
  description: UI/UX implementation, component generation, and styling
  tools: read,write,edit,bash,grep,find,ls

bowser:
  name: bowser
  description: Headless browser automation agent using Playwright CLI.
  tools: read,write,ls

indexer:
  name: indexer
  description: Scans a requested directory, reads key files, and writes INDEX.md — a navigable map of folders, files, and what each part does for other agents
  tools: read,write,edit,grep,find,ls,bash

plan-reviewer:
  name: plan-reviewer
  description: Plan critic — reviews, challenges, and validates implementation plans
  tools: read,grep,find,ls

# --- Special Agents (.pi/agents/specialagents/) ---

netlify-troubleshooter:
  name: netlify-troubleshooter
  description: CI/CD diagnostics, build-pipeline optimization, and dependency resolution for Netlify environments.
  tools: read,write,edit,bash,grep,find,ls

pi-dev-expert:
  name: pi-dev-expert
  description: Specialized in the Pi Coding Agent ecosystem, including core primitives, extensions, skills, and terminal-first orchestration.
  tools: read,write,edit,bash,grep,find,ls

ralph:
  name: ralph
  description: Ralph Wiggum — queue worker; one .txt ticket at a time (todo→inprogress→done), single HTML output per ticket.
  tools: read,write,edit,bash,grep,find,ls

session-manager:
  name: session-manager
  description: Session management agent for handling chat sessions, retrieving session metadata, and managing session history.
  tools: read,write,grep,find,ls

# --- Meta Experts (.pi/agents/pi-pi/) ---

pi-orchestrator:
  name: pi-orchestrator
  description: Primary meta-agent that coordinates experts and builds Pi components
  tools: read,write,edit,bash,grep,find,ls,query_experts

skill-expert:
  name: skill-expert
  description: Pi skills expert — knows SKILL.md format, frontmatter fields, directory structure, and validation rules.
  tools: read,grep,find,ls,bash

agent-expert:
  name: agent-expert
  description: Pi agent definitions expert — knows the .md frontmatter format for agent personas, teams.yaml structure, and orchestration.
  tools: read,grep,find,ls,bash

ext-builder:
  name: ext-builder
  description: Pi extensions expert — knows how to build custom tools, event handlers, commands, shortcuts, and custom rendering.
  tools: read,write,edit,bash,grep,find,ls

tui-expert:
  name: tui-expert
  description: Pi TUI expert — knows all built-in components, custom components, overlays, keyboard input, and widgets.
  tools: read,grep,find,ls,bash

cli-expert:
  name: cli-expert
  description: Pi CLI expert — knows all command line arguments, flags, environment variables, and output modes.
  tools: read,grep,find,ls,bash

config-expert:
  name: config-expert
  description: Pi configuration expert — knows settings.json, providers, models, packages, and keybindings.
  tools: read,grep,find,ls,bash

prompt-expert:
  name: prompt-expert
  description: Pi prompt templates expert — knows the single-file .md format, frontmatter, and positional arguments.
  tools: read,grep,find,ls,bash

theme-expert:
  name: theme-expert
  description: Pi themes expert — knows the JSON format, all 51 color tokens, vars system, and hot reload.
  tools: read,grep,find,ls,bash

keybinding-expert:
  name: keybinding-expert
  description: Pi keyboard shortcut expert — knows registerShortcut(), Key IDs, and reserved keys.
  tools: read,grep,find,ls,bash
