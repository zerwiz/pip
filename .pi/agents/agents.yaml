# Master Agent Registry
# Synchronized with .md files in the agent tree

scout:
  name: scout
  description: Fast recon and codebase exploration agent. Specialized in discovering file paths, configurations, and documentation storage locations across the agent system.
  tools: read,grep,find,ls

planner:
  name: planner
  description: Architecture and implementation planning
  tools: read,grep,find,ls,write

developer:
  name: developer
  description: Implementation and code generation
  tools: read,write,edit,bash,grep,find,ls

reviewer:
  name: reviewer
  description: Code review and quality checks
  tools: read,bash,grep,find,ls,write

documenter:
  name: documenter
  description: Documentation and README generation
  tools: read,write,edit,grep,find,ls

red-team:
  name: red-team
  description: Security and adversarial testing
  tools: read,bash,grep,find,ls

session-manager:
  name: session-manager
  description: Session management agent for handling chat sessions, retrieving session metadata, managing session history, and coordinating multi-session operations.
  tools: read,write,grep,find,ls

frontendcoder:
  name: frontend-coder
  description: UI/UX implementation, component generation, and styling
  tools: read,write,edit,bash,grep,find,ls

bowser:
  name: bowser
  description: Headless browser automation agent using Playwright CLI.
  tools: read,write,ls

ext-builder:
  name: ext-builder
  description: Pi extensions expert — knows how to build custom tools, event handlers, commands, shortcuts, state management, custom rendering, and tool overrides
  tools: read,write,edit,bash,grep,find,ls

# --- Domain Specialists ---

netlify-troubleshooter:
  name: netlify-troubleshooter
  description: CI/CD diagnostics, build-pipeline optimization, and dependency resolution for Netlify environments.
  tools: read,write,edit,bash,grep,find,ls

pi-dev-expert:
  name: pi-dev-expert
  description: Specialized in the Pi Coding Agent ecosystem, including core primitives, extensions, skills, and terminal-first orchestration.
  tools: read,write,edit,bash,grep,find,ls

plan-reviewer:
  name: plan-reviewer
  description: Plan critic — reviews, challenges, and validates implementation plans
  tools: read,grep,find,ls

# --- Homepage Team ---

dev-agent:
  name: dev-agent
  description: Homepage development specialist who turns designs into functional, high-performance webpages
  tools: read,write,edit,bash,grep,find,ls

content-agent:
  name: content-agent
  description: Homepage content specialist who creates compelling copy, optimizes for engagement and SEO
  tools: read,write,edit,bash,grep,find,ls

marketing-agent:
  name: marketing-agent
  description: Homepage marketing specialist who develops strategies, positioning, and conversion optimization approaches
  tools: read,write,bash,grep

research-agent:
  name: research-agent
  description: Homepage research assistant who gathers context, analyzes competitors, and validates content strategy
  tools: read,grep,find,ls,bash,web-search

design-agent:
  name: design-agent
  description: Homepage visual designer and UI/UX specialist for building beautiful, accessible homepages
  tools: read,write,edit,bash,grep,find,ls

seo-agent:
  name: seo-agent
  description: Homepage SEO specialist who optimizes pages for search engines while maintaining great UX
  tools: read,write,edit,bash,grep

accessibility-agent:
  name: accessibility-agent
  description: Homepage accessibility specialist who ensures WCAG compliance and inclusive design for all users
  tools: read,write,edit,bash,grep

image-agent:
  name: image-agent
  description: Homepage visual specialist who selects, optimizes, and creates compelling images for visual design
  tools: read,write,edit,bash,grep

# --- Meta Experts (Pi-Pi Team) ---

pi-orchestrator:
  name: pi-orchestrator
  description: Primary meta-agent that coordinates experts and builds Pi components
  tools: read,write,edit,bash,grep,find,ls,query_experts

skill-expert:
  name: skill-expert
  description: Pi skills expert — knows SKILL.md format, frontmatter fields, directory structure, validation rules, and skill command registration
  tools: read,grep,find,ls,bash

agent-expert:
  name: agent-expert
  description: Pi agent definitions expert — knows the .md frontmatter format for agent personas, teams.yaml structure, agent-team orchestration, and session management
  tools: read,grep,find,ls,bash

ext-expert:
  name: ext-expert
  description: Pi extensions expert — knows how to build custom tools, event handlers, commands, shortcuts, state management, custom rendering, and tool overrides
  tools: read,write,edit,bash,grep,find,ls

tui-expert:
  name: tui-expert
  description: Pi TUI expert — knows all built-in components, custom components, overlays, keyboard input, widgets, footers, and custom editors
  tools: read,grep,find,ls,bash

cli-expert:
  name: cli-expert
  description: Pi CLI expert — knows all command line arguments, flags, environment variables, subcommands, output modes, and non-interactive usage
  tools: read,grep,find,ls,bash

config-expert:
  name: config-expert
  description: Pi configuration expert — knows settings.json, providers, models, packages, keybindings, and all configuration options
  tools: read,grep,find,ls,bash

prompt-expert:
  name: prompt-expert
  description: Pi prompt templates expert — knows the single-file .md format, frontmatter, positional arguments, and /template invocation
  tools: read,grep,find,ls,bash

theme-expert:
  name: theme-expert
  description: Pi themes expert — knows the JSON format, all 51 color tokens, vars system, hex/256-color values, hot reload, and theme distribution
  tools: read,grep,find,ls,bash

keybinding-expert:
  name: keybinding-expert
  description: Pi keyboard shortcut expert — knows registerShortcut(), Key IDs, modifier combos, reserved keys, and keybindings.json customization
  tools: read,grep,find,ls,bash
