# Agents Registry for sipatch agent discovery
# Each agent is defined by their specialist_id for reliable identification
# This file enables the sipatch agent to discover and dispatch all available agents

# Headless browser automation agent
bowser:
  description: Headless browser automation agent using Playwright CLI. Use when you need headless browsing, parallel browser sessions, UI testing, screenshots, or web scraping.
  specialist_id: bowser
  models: nemotron-cascade-2:30b
  color: orange
  tools:
    - read
    - write
    - ls

