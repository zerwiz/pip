# Homepage Builder Agent Team Configuration
# This file defines how agents are organized into teams for different use cases
# The first team listed is the default that runs on session start

# Primary team - Complete homepage building workflow
homepage-builder-team:
  - design-agent
  - frontend-coder
  - content-agent
  - dev-agent
  - research-agent
  - marketing-agent
  - image-agent
  - seo-agent
  - accessibility-agent

# SEO-focused homepage team
seo-optimization-team:
  - research-agent
  - content-agent
  - seo-agent
  - analytics-agent
  - marketing-agent

# Creative design team - Focus on visuals and aesthetics
creative-design-team:
  - design-agent
  - image-agent
  - vision-agent
  - blog-agent

# Content creation pipeline - Research → Content → Design → Dev
content-pipeline:
  - research-agent
  - content-agent
  - design-agent
  - dev-agent

# Accessibility-focused team - Ensures inclusive web experiences
